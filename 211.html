<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта от мужского коллектива Свердловскстата</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Фон из плавающих цветов -->
    <div class="flower-bg" id="flowerBg"></div>

    <div class="album-container">
        <h1 class="title">С 8 Марта, дорогие женщины! <br> <span style="font-size: 0.55em; display: block;">От мужского
                коллектива Свердловскстата</span></h1>

        <div class="music-control" id="musicControl">
            <i class="fas fa-play"></i>
        </div>

        <div class="album" id="album"></div>

        <div class="page-counter" id="pageCounter">Страница 1 из 51</div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> Назад</button>
            <button class="nav-btn" id="nextBtn">Вперед <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <audio id="backgroundMusic" loop></audio>

</body>

</html>
